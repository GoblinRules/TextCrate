name = "textcrate-long-text-relay"
main = "src/index.ts"
compatibility_date = "2026-06-29"
workers_dev = false

routes = [{ pattern = "qz9v4k.ghostkernel.cc", custom_domain = true }]

[[kv_namespaces]]
binding = "RELAY_KV"
id = "replace-with-production-kv-namespace-id"
preview_id = "replace-with-preview-kv-namespace-id"

[vars]
MAX_CIPHERTEXT_BYTES = "262144"
RATE_LIMIT_PER_MINUTE = "30"
RATE_LIMIT_PER_HOUR = "300"
